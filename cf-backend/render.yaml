services:
  - type: web
    name: cf-heaven-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: ACCESS_EXPIRES_IN
        value: 15m
      - key: REFRESH_EXPIRES_IN_DAYS
        value: "7"
